name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 3 * * *" # nightly 03:00 UTC — jobul isolation-concurrent (NX-53)

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    env:
      OPENAI_API_KEY: test-key
      META_ACCESS_TOKEN: test-token
      META_APP_SECRET: test-secret
      META_VERIFY_TOKEN: test-verify
      META_PHONE_NUMBER_ID: "000000000"
      SUPABASE_DB_URL: postgresql://test:test@localhost/test
      REDIS_URL: redis://localhost:6379/0
      ENV: test
      LOG_LEVEL: WARNING
      DAILY_COST_CAP_USD: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      - run: pytest -x -q -m "not integration"

  isolation-concurrent:
    name: Izolare concurentă (NX-53)
    runs-on: ubuntu-latest
    # NU pe PR-uri (atinge DB real) — doar pe main + nightly. Obligatoriu pe main.
    if: github.event_name != 'pull_request'
    env:
      # SUPABASE_DB_URL = secret repo (URL pooler, rezolvabil pe IPv4 din Actions).
      # Compat mode (fără DATABASE_URL_BOT) → SET ROLE bot_runtime în init.
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      OPENAI_API_KEY: test-key
      REDIS_URL: redis://localhost:6379/0
      ENV: test
      LOG_LEVEL: WARNING
      DAILY_COST_CAP_USD: "5"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements-dev.txt

      # NX-123: poarta de migrări — pică build-ul dacă există migrări neaplicate pe DB-ul real
      # (read-only: --check NU mutează prod). Mută regresia 010/012 de la „prod, primul client" la CI.
      - name: Verifică migrări la zi (NX-123)
        run: python scripts/migrate.py --check

      # include smoke-test-ul de grant/policy (test_grants_smoke.py: integration + slow).
      - run: pytest -q -m "integration and slow"
