# Mediu de dev: Redis + webhook (hot reload) + worker + dispatcher.
# Postgres NU e local — e Supabase remote (SUPABASE_DB_URL din .env).
# Pornire: docker compose up
#
# Redis (NX-02): durabil + securizat.
#  • --appendonly yes --appendfsync everysec → un restart nu pierde mesaje în zbor
#  • --requirepass → fără auth nu se conectează nimeni la backbone
#  • --maxmemory-policy noeviction → la presiune de memorie, XADD dă eroare
#    (webhook → 503, Meta reîncearcă, NX-51 deduplică) în loc de pierdere TĂCUTĂ
#  • fără `ports:` publicat → Redis e doar pe rețeaua internă compose
#    (pentru redis-cli: `docker compose exec redis redis-cli -a $REDIS_PASSWORD`)

services:
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --appendfsync everysec
      --maxmemory-policy noeviction
      --save ""
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  webhook:
    build: .
    command: uvicorn src.webhook.app:app --reload --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  worker:
    build: .
    command: python -m src.worker.consumer
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  dispatcher:
    build: .
    command: python -m src.worker.dispatcher
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

  # Mini-scheduler intern (NX-83): rulează joburile de mentenanță la intervale fixe.
  #  • rollup_usage zilnic (facturare/dashboard din usage_daily)
  #  • cleanup_dedupe la 6h (purjă inbound_dedupe >48h)
  #  • embed_products orar incremental (doar dacă OPENAI_API_KEY e setat)
  #  • proactive_initiators (PL-1): creează proactive_jobs (coș abandonat + back-in-stock)
  # Folosește DOAR DB-ul (admin_conn), nu Redis. Healthcheck pe heartbeat file; restart automat.
  scheduler:
    build: .
    command: python -m src.jobs.scheduler
    volumes:
      - ./src:/app/src
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import time,sys; sys.exit(0 if time.time()-float(open('/tmp/scheduler_alive').read())<360 else 1)"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 30s

  # Motor proactiv (NX-70): scheduler peste proactive_jobs → outbox (dispatcher-ul
  # trimite). Folosește DOAR DB-ul (admin_conn + tenant_conn), nu Redis. Iese imediat
  # dacă PROACTIVE_ENABLED=false.
  proactive:
    build: .
    command: python -m src.proactive.scheduler
    volumes:
      - ./src:/app/src
    env_file: .env

  # Canal de TEST (NX-61): long polling Telegram → stream inbound. Pornește doar
  # dacă TELEGRAM_BOT_TOKEN e setat (altfel iese imediat, fără să blocheze restul).
  telegram-poller:
    build: .
    command: python -m src.channels.telegram.poller
    volumes:
      - ./src:/app/src
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy

volumes:
  redis-data:
