[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
markers = [
    "integration: teste care ating servicii reale (excluse din CI)",
    "slow: teste lente (ex. concurență NX-53); rulează în jobul nightly, nu pe PR-uri",
]
